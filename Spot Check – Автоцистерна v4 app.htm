<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spot Check – Автоцистерна</title>
<!-- PWA -->
<meta name="application-name" content="Spot Check">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spot Check">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a5c">
<link rel="manifest" id="manifestLink">
<link rel="apple-touch-icon" id="pwaIcon">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap');

:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --border: #dde1e8;
  --accent: #c8370a;
  --accent2: #1a3a5c;
  --ok: #1a7a4a;
  --ok-bg: #e6f5ed;
  --warn: #b06a00;
  --warn-bg: #fff3e0;
  --fail: #c0281a;
  --fail-bg: #fdecea;
  --text: #1a1e2a;
  --muted: #7a8299;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
  font-size: 15px;
}

/* ── HEADER ── */
header {
  background: var(--accent2);
  color: #fff;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 3px 16px rgba(0,0,0,0.25);
}
.header-title-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px 10px;
  border-bottom: 2px solid var(--accent);
}
.logo { font-size: 30px; }
.header-text h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #fff;
  line-height: 1.1;
}
.header-text p { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }

.header-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 10px 16px 12px;
}
.meta-field label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 3px;
}
.meta-field input, .meta-field select {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 7px 10px;
  color: #fff;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.meta-field input::placeholder { color: rgba(255,255,255,0.3); }
.meta-field input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.15); }
.meta-field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); }

/* PROGRESS */
.progress-wrap { padding: 0 16px 10px; }
.progress-row { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.progress-bar { height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #f5a623); border-radius: 3px; transition: width 0.4s ease; width: 0%; }

/* ── MAIN ── */
main { padding: 14px; max-width: 680px; margin: 0 auto; }

/* ── SECTION ── */
.section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.sec-header {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  cursor: pointer;
  user-select: none;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  gap: 10px;
  transition: background 0.15s;
}
.sec-header:active { background: #f5f7fa; }
.sec-letter {
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: var(--accent2);
  min-width: 30px;
  height: 30px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.sec-letter.warn-bg { background: var(--accent); }
.sec-title {
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
  flex: 1;
  color: var(--text);
  line-height: 1.2;
}
.sec-badge {
  font-size: 11px;
  border-radius: 20px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.sec-badge.complete { background: var(--ok-bg); color: var(--ok); border-color: #b2dfca; }
.chevron { color: var(--muted); font-size: 13px; transition: transform 0.25s; flex-shrink: 0; }
.section.open .chevron { transform: rotate(180deg); }

.sec-body { display: none; }
.section.open .sec-body { display: block; }

/* ── ITEM ── */
.item {
  border-bottom: 1px solid #f0f2f5;
  padding: 11px 14px;
}
.item:last-child { border-bottom: none; }

.item-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.item-num {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  min-width: 20px;
  padding-top: 2px;
  flex-shrink: 0;
}
.item-label {
  flex: 1;
  font-size: 14px;
  line-height: 1.45;
  color: var(--text);
}
.item-label small {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  font-style: italic;
}
.btn-group {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
  align-items: flex-start;
}
.sbtn {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: transparent;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.sbtn:active { transform: scale(0.87); }
.sbtn.active-ok  { background: var(--ok-bg);   border-color: var(--ok);   box-shadow: 0 0 0 2px rgba(26,122,74,0.2); }
.sbtn.active-fail { background: var(--fail-bg); border-color: var(--fail); box-shadow: 0 0 0 2px rgba(192,40,26,0.2); }

/* COMMENT FIELD */
.comment-wrap { padding: 5px 14px 10px 44px; display: none; }
.comment-wrap.visible { display: block; }
.comment-wrap textarea, .comment-wrap input[type="text"] {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: #fafbfc;
  resize: none;
  outline: none;
  min-height: 46px;
  transition: border-color 0.2s;
}
.comment-wrap input[type="text"] { min-height: unset; }
.comment-wrap textarea:focus, .comment-wrap input:focus { border-color: var(--accent2); background: #fff; }
.comment-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

/* PRESSURE FIELD */
.pressure-wrap {
  padding: 5px 14px 10px 44px;
}
.pressure-row { display: flex; align-items: center; gap: 8px; }
.pressure-wrap input {
  width: 90px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  color: var(--text);
  background: #fafbfc;
  outline: none;
  transition: border-color 0.2s;
}
.pressure-wrap input:focus { border-color: var(--accent2); }
.pressure-unit { font-size: 12px; color: var(--muted); }

/* DATE FIELDS */
.dates-wrap {
  padding: 5px 14px 10px 44px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.date-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
  min-width: 140px;
}
.date-field label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
}
.date-field input[type="date"] {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: #fafbfc;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.date-field input[type="date"]:focus { border-color: var(--accent2); background: #fff; }

/* SEPARATOR */
.sec-sep {
  padding: 8px 14px 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  background: #fafbfc;
  border-bottom: 1px solid #f0f2f5;
}

/* ── SUMMARY ── */
.summary-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
}
.summary-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent2);
  letter-spacing: 0.5px;
}
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.s-stat {
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.s-stat.ok { background: var(--ok-bg); }
.s-stat.fail { background: var(--fail-bg); }
.s-stat.pending { background: #f0f2f5; }
.s-num { font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 700; line-height: 1; }
.s-stat.ok .s-num { color: var(--ok); }
.s-stat.fail .s-num { color: var(--fail); }
.s-stat.pending .s-num { color: var(--muted); }
.s-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.3px; }

/* OBSERVATIONS */
.obs-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
}
.obs-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--accent2);
}
.obs-card textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: #fafbfc;
  resize: none;
  outline: none;
  min-height: 80px;
  transition: border-color 0.2s;
}
.obs-card textarea:focus { border-color: var(--accent2); }

/* SIGNATURE */
.sig-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
}
.sig-card h3 { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 10px; color: var(--accent2); }
.sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sig-box { display: flex; flex-direction: column; gap: 4px; }
.sig-box label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
canvas.sig {
  width: 100%;
  height: 90px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: #fafbfc;
  touch-action: none;
  cursor: crosshair;
  display: block;
}
.sig-clear {
  font-size: 10px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  text-align: right;
  padding: 2px 0;
  text-decoration: underline;
}

/* PHOTO BUTTON */
.btn-photo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent2);
  color: #fff;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px;
  font-family: 'Source Sans 3', sans-serif;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-photo:active { opacity: 0.8; }
.photo-thumb {
  position: relative;
  width: 80px;
  height: 80px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.photo-thumb .remove-photo {
  position: absolute;
  top: 2px;
  right: 2px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.photo-status {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* SUBMIT */
.actions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.btn-submit {
  background: linear-gradient(135deg, var(--accent) 0%, #e8441a 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 16px;
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  letter-spacing: 1.5px;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 4px 16px rgba(200,55,10,0.35);
  transition: opacity 0.2s, transform 0.1s;
}
.btn-submit:active { transform: scale(0.98); }
.btn-print {
  background: var(--accent2);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 13px;
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  cursor: pointer;
  width: 100%;
  transition: opacity 0.2s;
}
.btn-reset {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  width: 100%;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ok);
  color: #fff;
  padding: 12px 22px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  z-index: 999;
  transition: transform 0.35s ease;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.err { background: var(--fail); }

/* PRINT */
@media print {
  header { position: static; }
  .sec-body { display: block !important; }
  .actions, .btn-group { display: none; }
  .comment-wrap { display: block !important; }
}
</style>
</head>
<body>

<header>
  <div class="header-title-bar">
    <div class="logo">🚛</div>
    <div class="header-text">
      <h1>SPOT CHECK – АВТОЦИСТЕРНА</h1>
      <p>Обединен контролен лист · LPG Газовоз</p>
    </div>
  </div>
  <div class="header-meta">
    <div class="meta-field">
      <label>Търговски обект</label>
      <input type="text" id="site" placeholder="Обект / номер">
    </div>
    <div class="meta-field">
      <label>Рег. № на МПС / Газовоз №</label>
      <input type="text" id="regnum" placeholder="CB 0000 AB">
    </div>
    <div class="meta-field">
      <label>Шофьор / Превозвач</label>
      <input type="text" id="driver" placeholder="Ime Prezime">
    </div>
    <div class="meta-field">
      <label>Проверяващ</label>
      <input type="text" id="inspector" placeholder="Ima Prezime">
    </div>
    <div class="meta-field">
      <label>Дата</label>
      <input type="date" id="checkdate">
    </div>
    <div class="meta-field">
      <label>Километраж</label>
      <input type="number" id="km" placeholder="0 км">
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-row">
      <span>Прогрес</span>
      <span id="progressText">0 / 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<main>
  <div id="container"></div>

  <!-- SUMMARY -->
  <div class="summary-card">
    <h3>📊 Резюме</h3>
    <div class="summary-grid">
      <div class="s-stat ok"><div class="s-num" id="cntOk">0</div><div class="s-lbl">✅ Да / Добре</div></div>
      <div class="s-stat fail"><div class="s-num" id="cntFail">0</div><div class="s-lbl">❌ Не / Проблем</div></div>
      <div class="s-stat pending" style="grid-column:1/-1"><div class="s-num" id="cntPend">0</div><div class="s-lbl">⬜ Непопълнени</div></div>
    </div>
  </div>

  <!-- OBSERVATIONS -->
  <div class="obs-card">
    <h3>📝 Други наблюдения</h3>
    <textarea id="observations" placeholder="Допълнителни забележки, наблюдения, коментари..."></textarea>
  </div>

  <!-- SIGNATURES -->
  <div class="sig-card">
    <h3>✍️ Подписи</h3>
    <div class="sig-grid">
      <div class="sig-box">
        <label>Проверил</label>
        <canvas class="sig" id="sigInspector"></canvas>
        <button class="sig-clear" onclick="clearSig('sigInspector')">изчисти</button>
      </div>
      <div class="sig-box">
        <label>Шофьор</label>
        <canvas class="sig" id="sigDriver"></canvas>
        <button class="sig-clear" onclick="clearSig('sigDriver')">изчисти</button>
      </div>
    </div>
  </div>

  <!-- PHOTOS -->
  <div class="obs-card" id="photoCard">
    <h3>📸 Снимки от проверката</h3>
    <div id="photoGrid" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;"></div>
    <label class="btn-photo" id="photoBtn">
      <span>📷 Добави снимка</span>
      <input type="file" id="photoInput" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotos(this)">
    </label>
    <p style="font-size:11px;color:var(--muted);margin-top:8px;">Снимките ще се качат в Google Drive и линковете ще се запишат в таблицата.</p>
  </div>

  <div class="actions">
    <button class="btn-submit" onclick="submitForm()">📤 ИЗПРАТИ КЪМ GOOGLE SHEETS</button>
    <button class="btn-print" onclick="window.print()">🖨️ ПРИНТ / PDF</button>
    <button class="btn-reset" onclick="resetAll()">🔄 Нулирай всички отговори</button>
  </div>
</main>

<div class="toast" id="toast">✅ Проверката е запазена!</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const SECTIONS = [
  {
    letter: 'A', label: 'ОБЩА ПРОВЕРКА НА МПС',
    items: [
      { id:'A1', q:'Общо състояние на превозното средство', hint:'Без признаци на повреда, чистота, налични бариери срещу прегазване', comment:true },
      { id:'A2', q:'Състояние на кабина', hint:'Предно стъкло, прозорци, огледала, предпазен колан', comment:true },
      { id:'A3', q:'Състояние на чистачките на предното стъкло', comment:true },
      { id:'A4', q:'Състояние на гумите, съобразени със сезона', comment:true },
      { id:'A5', q:'Наличие на необходимите знаци', hint:'ADR, опасност от експлозия, забрана за телефон/пушене', comment:true },
      { id:'A6', q:'Пожарогасители – кабина/ремарке', hint:'Наличие, дата на изтичане', comment:true, dates:[{id:'A6d1', label:'Дата на изтичане'}] },
      { id:'A7', q:'Тахограф – наличност, режим работа и почивка, престой', comment:true },
      { id:'A8', q:'Маркуч, макара и резбови накрайници', hint:'Износване и херметичност', comment:true },
      { id:'A9', q:'Достъпът до резервоара е подходящ?', hint:'Без нужда от катерене, резервоарът не е твърде отдалечен', comment:true },
      { id:'A10', q:'Клинове за колелата – налични?', hint:'2 бр. на колело', comment:true },
      { id:'A11', q:'Паркинг спирачка', hint:'Активиране, аларма за заден ход', comment:true },
    ]
  },
  {

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {};

// ─── BUILD UI ─────────────────────────────────────────────────────────────────
function build() {
  const container = document.getElementById('container');
  SECTIONS.forEach((sec, sIdx) => {
    // init state
    sec.items.forEach(item => {
      if (!sec.infoOnly && item.type !== 'text') state[item.id] = { val: null, comment: '' };
      if (item.pressure) state[item.pressureId] = '';
      if (item.dates) item.dates.forEach(d => { state[d.id] = ''; });
    });

    const div = document.createElement('div');
    div.className = 'section open';
    div.id = `sec-${sIdx}`;

    const letterClass = sec.accent ? 'sec-letter warn-bg' : 'sec-letter';
    const totalQ = sec.infoOnly ? 0 : sec.items.filter(i => i.type !== 'text').length;

    let html = `
      <div class="sec-header" onclick="toggleSec(${sIdx})">
        <div class="${letterClass}">${sec.letter}</div>
        <div class="sec-title">${sec.label}</div>
        ${totalQ > 0 ? `<div class="sec-badge" id="badge-${sIdx}">0/${totalQ}</div>` : ''}
        <div class="chevron">▾</div>
      </div>
      <div class="sec-body">`;

    sec.items.forEach((item, iIdx) => {
      if (sec.infoOnly || item.type === 'text') {
        // Info / text field only
        html += `
          <div class="item">
            <div class="item-row">
              <div class="item-num">${item.id.replace(/[A-Z]/,'')}</div>
              <div class="item-label">${item.q}</div>
            </div>
            <div class="comment-wrap visible">
              <input type="text" placeholder="${item.placeholder || 'Въведи отговор...'}" oninput="setInfo('${item.id}', this.value)">
            </div>
          </div>`;
      } else if (item.pressure) {
        // Yes/No + pressure value
        html += `
          <div class="item">
            <div class="item-row">
              <div class="item-num">${item.id.replace(/[A-Z]/,'')}</div>
              <div class="item-label">${item.q}${item.hint ? `<small>${item.hint}</small>` : ''}</div>
              <div class="btn-group">
                <button class="sbtn" id="ok-${item.id}" onclick="setVal('${item.id}','ok',${sIdx})" title="Да">✅</button>
                <button class="sbtn" id="fail-${item.id}" onclick="setVal('${item.id}','fail',${sIdx})" title="Не">❌</button>
              </div>
            </div>
            <div class="pressure-wrap">
              <div class="pressure-row">
                <span class="pressure-unit">${item.pressureLabel || 'Стойност:'}</span>
                <input type="number" step="0.1" placeholder="0.0" id="${item.pressureId}" oninput="state['${item.pressureId}']=this.value">
                <span class="pressure-unit">бара</span>
              </div>
            </div>
            <div class="comment-wrap visible" id="cw-${item.id}">
              <div class="comment-label">Коментар</div>
              <textarea rows="2" placeholder="Забележка..." oninput="state['${item.id}'].comment=this.value"></textarea>
            </div>
          </div>`;
      } else {
        // Standard Yes/No item
        const datesHtml = item.dates ? `
          <div class="dates-wrap">
            ${item.dates.map(d => `
              <div class="date-field">
                <label>${d.label}</label>
                <input type="date" id="${d.id}" oninput="state['${d.id}']=this.value">
              </div>`).join('')}
          </div>` : '';
        html += `
          <div class="item">
            <div class="item-row">
              <div class="item-num">${item.id.replace(/[A-Z]/g,'')}</div>
              <div class="item-label">${item.q}${item.hint ? `<small>${item.hint}</small>` : ''}</div>
              <div class="btn-group">
                <button class="sbtn" id="ok-${item.id}" onclick="setVal('${item.id}','ok',${sIdx})" title="Да">✅</button>
                <button class="sbtn" id="fail-${item.id}" onclick="setVal('${item.id}','fail',${sIdx})" title="Не">❌</button>
              </div>
            </div>
            ${datesHtml}
            ${item.comment ? `<div class="comment-wrap visible" id="cw-${item.id}">
              <div class="comment-label">Коментар</div>
              <textarea rows="2" placeholder="Забележка..." oninput="state['${item.id}'].comment=this.value"></textarea>
            </div>` : ''}
          </div>`;
      }
    });

    html += `</div>`;
    div.innerHTML = html;
    container.appendChild(div);
  });

  updateProgress();
}

function toggleSec(idx) {
  document.getElementById(`sec-${idx}`).classList.toggle('open');
}

function setVal(id, val, sIdx) {
  if (!state[id]) return;
  const prev = state[id].val;
  state[id].val = (prev === val) ? null : val;

  ['ok','fail'].forEach(v => {
    const btn = document.getElementById(`${v}-${id}`);
    if (btn) { btn.classList.remove(`active-${v}`); }
  });
  if (state[id].val) {
    const btn = document.getElementById(`${state[id].val}-${id}`);
    if (btn) btn.classList.add(`active-${state[id].val}`);
  }

  updateProgress();
  updateBadge(sIdx);
  updateSummary();
}

function setInfo(id, val) { state[id] = val; }

function updateBadge(sIdx) {
  const sec = SECTIONS[sIdx];
  if (!sec || sec.infoOnly) return;
  const q = sec.items.filter(i => i.type !== 'text' && state[i.id]);
  const done = q.filter(i => state[i.id].val !== null).length;
  const total = q.length;
  const badge = document.getElementById(`badge-${sIdx}`);
  if (badge) {
    badge.textContent = `${done}/${total}`;
    badge.className = done === total ? 'sec-badge complete' : 'sec-badge';
  }
}

function updateProgress() {
  const ids = Object.keys(state).filter(k => state[k] && typeof state[k] === 'object' && 'val' in state[k]);
  const total = ids.length;
  const done = ids.filter(k => state[k].val !== null).length;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = total ? `${(done/total)*100}%` : '0%';
}

function updateSummary() {
  const vals = Object.values(state).filter(v => v && typeof v === 'object' && 'val' in v).map(v => v.val);
  document.getElementById('cntOk').textContent = vals.filter(v => v === 'ok').length;
  document.getElementById('cntFail').textContent = vals.filter(v => v === 'fail').length;
  document.getElementById('cntPend').textContent = vals.filter(v => v === null).length;
}

function resetAll() {
  if (!confirm('Сигурен ли сте, че искате да нулирате всички отговори?')) return;
  Object.keys(state).forEach(k => {
    if (state[k] && typeof state[k] === 'object' && 'val' in state[k]) {
      state[k] = { val: null, comment: '' };
      ['ok','fail'].forEach(v => {
        const btn = document.getElementById(`${v}-${k}`);
        if (btn) btn.classList.remove(`active-${v}`);
      });
    }
  });
  document.querySelectorAll('textarea').forEach(t => t.value = '');
  document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
  document.querySelectorAll('.date-field input[type="date"]').forEach(i => i.value = '');
  updateProgress();
  updateSummary();
  SECTIONS.forEach((_, i) => updateBadge(i));
}

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbywLLJ1Z2qHqk-8jEe3oxenmrscmj2T9yF8tQioDykRvr7-bxiKy1j6G0JydjLwVWck/exec';
const DRIVE_FOLDER_ID = '1ENHA4jKl84c-eDqUTjibktsEcHDXFlOV';

// ─── PHOTOS ───────────────────────────────────────────────────────────────────
let photos = []; // { file, dataUrl }

function handlePhotos(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      photos.push({ file, dataUrl: e.target.result });
      renderPhotos();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderPhotos() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `
      <img src="${p.dataUrl}">
      <button class="remove-photo" onclick="removePhoto(${i})">✕</button>`;
    grid.appendChild(div);
  });
}

function removePhoto(idx) {
  photos.splice(idx, 1);
  renderPhotos();
}

async function uploadPhotos() {
  if (photos.length === 0) return [];
  const links = [];
  const regnum = document.getElementById('regnum').value || 'неизвестен';
  const dateVal = document.getElementById('checkdate').value || new Date().toISOString().slice(0,10);

  for (let i = 0; i < photos.length; i++) {
    const p = photos[i];
    const base64 = p.dataUrl.split(',')[1];
    const mimeType = p.file.type || 'image/jpeg';
    const fileName = `${dateVal}_${regnum}_снимка${i+1}.jpg`;

    try {
      const resp = await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'uploadPhoto',
          folderId: DRIVE_FOLDER_ID,
          fileName,
          mimeType,
          base64
        })
      });
      // no-cors means we can't read response, assume ok
      links.push(`Снимка ${i+1} качена`);
    } catch(e) {
      links.push(`Снимка ${i+1} – грешка`);
    }
  }
  return links;
}

function buildHeaders() {
  const headers = [
    'Дата', 'Час', 'Търговски обект', 'Рег. №', 'Шофьор / Превозвач',
    'Проверяващ', 'Дата на проверка', 'Километраж'
  ];
  SECTIONS.forEach(sec => {
    sec.items.forEach(item => {
      const prefix = item.id + ' – ';
      if (sec.infoOnly || item.type === 'text') {
        headers.push(prefix + item.q);
      } else {
        headers.push(prefix + item.q);
        headers.push(prefix + item.q + ' (коментар)');
      }
      if (item.dates) item.dates.forEach(d => headers.push(item.id + ' – ' + d.label));
      if (item.pressure) headers.push(item.id + ' – ' + (item.pressureLabel || 'Налягане (бара)'));
    });
  });
  headers.push('Други наблюдения');
  return headers;
}

function buildRow() {
  const now = new Date();
  const row = [
    now.toLocaleDateString('bg-BG'),
    now.toLocaleTimeString('bg-BG', {hour:'2-digit', minute:'2-digit'}),
    document.getElementById('site').value || '',
    document.getElementById('regnum').value || '',
    document.getElementById('driver').value || '',
    document.getElementById('inspector').value || '',
    document.getElementById('checkdate').value || '',
    document.getElementById('km').value || '',
  ];
  SECTIONS.forEach(sec => {
    sec.items.forEach(item => {
      if (sec.infoOnly || item.type === 'text') {
        row.push(state[item.id] || '');
      } else {
        const s = state[item.id];
        row.push(s ? (s.val === 'ok' ? 'ДА' : s.val === 'fail' ? 'НЕ' : '–') : '–');
        row.push(s ? (s.comment || '') : '');
      }
      if (item.dates) item.dates.forEach(d => row.push(state[d.id] || ''));
      if (item.pressure) row.push(state[item.pressureId] || '');
    });
  });
  row.push(document.getElementById('observations').value || '');
  return row;
}

async function submitForm() {
  const total = Object.keys(state).filter(k => state[k] && typeof state[k] === 'object' && 'val' in state[k]).length;
  const done  = Object.keys(state).filter(k => state[k] && typeof state[k] === 'object' && state[k].val !== null).length;
  if (done < total) {
    if (!confirm(`Има ${total - done} непопълнени точки. Искате ли да продължите?`)) return;
  }

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true;

  // Upload photos first
  let photoLinks = [];
  if (photos.length > 0) {
    btn.textContent = `⏳ Качват се ${photos.length} снимки...`;
    photoLinks = await uploadPhotos();
  }

  btn.textContent = '⏳ Изпраща се...';

  const headers = buildHeaders();
  const row = buildRow();

  // Add photo info to headers/row
  headers.push('Брой снимки');
  row.push(photos.length > 0 ? photos.length : 0);
  headers.push('Снимки');
  row.push(photoLinks.length > 0 ? photoLinks.join(', ') : '');

  const payload = { headers, row, folderId: DRIVE_FOLDER_ID };

  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    showToast('✅ Записано в Google Sheets!', false);
    btn.textContent = '✅ ИЗПРАТЕНО!';
    btn.style.background = 'linear-gradient(135deg, #1a7a4a, #25a366)';
    setTimeout(() => {
      btn.textContent = '📤 ИЗПРАТИ КЪМ GOOGLE SHEETS';
      btn.style.background = '';
      btn.disabled = false;
    }, 4000);
  })
  .catch(() => {
    showToast('❌ Грешка при изпращане. Провери интернет.', true);
    btn.textContent = '📤 ИЗПРАТИ КЪМ GOOGLE SHEETS';
    btn.disabled = false;
  });
}

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${err ? ' err' : ''} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── SIGNATURE CANVAS ─────────────────────────────────────────────────────────
function initSig(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  let drawing = false;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#1a3a5c';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resize();
  window.addEventListener('resize', resize);

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
  canvas.addEventListener('touchend', () => drawing = false);
}

function clearSig(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ─── PWA SETUP ────────────────────────────────────────────────────────────────

// Generate icon as canvas data URL
function generateIcon() {
  const canvas = document.createElement('canvas');
  canvas.width = 192; canvas.height = 192;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#1a3a5c';
  ctx.beginPath();
  ctx.roundRect(0, 0, 192, 192, 32);
  ctx.fill();
  // Truck emoji
  ctx.font = '100px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🚛', 96, 96);
  return canvas.toDataURL('image/png');
}

function setupPWA() {
  const iconUrl = generateIcon();

  // Set apple touch icon
  document.getElementById('pwaIcon').href = iconUrl;

  // Create manifest blob
  const manifest = {
    name: 'Spot Check – Автоцистерна',
    short_name: 'Spot Check',
    description: 'Контролен лист за проверка на автоцистерна',
    start_url: '.',
    display: 'standalone',
    background_color: '#f0f2f5',
    theme_color: '#1a3a5c',
    orientation: 'portrait',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/png' },
      { src: iconUrl, sizes: '512x512', type: 'image/png' }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const manifestUrl = URL.createObjectURL(blob);
  document.getElementById('manifestLink').href = manifestUrl;

  // Register service worker (inline as blob)
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'spotcheck-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.'])));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ));
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('.')))
        );
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }

  // Show install banner if available
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner() {
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.innerHTML = `
      <div style="
        position:fixed;bottom:0;left:0;right:0;
        background:#1a3a5c;color:#fff;
        padding:14px 16px;
        display:flex;align-items:center;justify-content:space-between;
        z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);
        font-family:'Source Sans 3',sans-serif;
      ">
        <div>
          <div style="font-weight:600;font-size:14px;">🚛 Инсталирай като приложение</div>
          <div style="font-size:11px;opacity:0.7;margin-top:2px;">Достъп без браузър, работи офлайн</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="document.getElementById('installBanner').remove()" style="
            background:transparent;border:1px solid rgba(255,255,255,0.3);
            color:#fff;border-radius:6px;padding:7px 12px;font-size:12px;cursor:pointer;
          ">По-късно</button>
          <button id="installBtn" style="
            background:#c8370a;border:none;color:#fff;
            border-radius:6px;padding:7px 14px;font-size:13px;
            font-weight:600;cursor:pointer;
          ">Инсталирай</button>
        </div>
      </div>`;
    document.body.appendChild(banner);
    document.getElementById('installBtn').addEventListener('click', () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        banner.remove();
        deferredPrompt = null;
      });
    });
  }
}

setupPWA();

// ─── INIT ─────────────────────────────────────────────────────────────────────
build();
initSig('sigInspector');
initSig('sigDriver');

// Auto-set today's date
document.getElementById('checkdate').valueAsDate = new Date();
</script>
